<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Edit Skill | LearnTrack</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<!-- ===================== NAVIGATION ===================== -->

<nav>

    <div class="logo">
        LearnTrack
    </div>

    <ul>

        <li><a href="/">Home</a></li>

        <li><a href="/entries">Skills</a></li>

        <li><a href="/about">About</a></li>

        <li>
            <a href="/add" class="nav-btn">
                + Add Skill
            </a>
        </li>

    </ul>

</nav>


<!-- ===================== EDIT FORM ===================== -->

<div class="container">

    <h1>Edit Skill</h1>

    <form action="/edit/{{ index }}" method="POST">

        <!-- Skill -->

        <label for="skill">Skill Name</label>

        <input
            type="text"
            id="skill"
            name="skill"
            value="{{ entry.skill }}"
            required
        >

        <!-- Category -->

        <label for="category">Category</label>

        <select id="category" name="category" required>

            <option value="Programming" {% if entry.category=="Programming" %}selected{% endif %}>Programming</option>

            <option value="Web Development" {% if entry.category=="Web Development" %}selected{% endif %}>Web Development</option>

            <option value="Data Structures" {% if entry.category=="Data Structures" %}selected{% endif %}>Data Structures</option>

            <option value="Database" {% if entry.category=="Database" %}selected{% endif %}>Database</option>

            <option value="Tools" {% if entry.category=="Tools" %}selected{% endif %}>Tools</option>

            <option value="Other" {% if entry.category=="Other" %}selected{% endif %}>Other</option>

        </select>

        <!-- Level -->

        <label for="level">Current Level</label>

        <select id="level" name="level" required>

            <option value="Beginner" {% if entry.level=="Beginner" %}selected{% endif %}>Beginner</option>

            <option value="Intermediate" {% if entry.level=="Intermediate" %}selected{% endif %}>Intermediate</option>

            <option value="Advanced" {% if entry.level=="Advanced" %}selected{% endif %}>Advanced</option>

        </select>

        <!-- Progress -->

        <label for="progress">Progress (%)</label>

        <input
            type="number"
            id="progress"
            name="progress"
            min="0"
            max="100"
            value="{{ entry.progress }}"
            required
        >

        <!-- Study Time -->

        <label for="study_time">Time Invested (minutes)</label>

        <input
            type="number"
            id="study_time"
            name="study_time"
            value="{{ entry.study_time }}"
            min="1"
            required
        >

        <!-- Learning -->

        <label for="learning">What did you learn?</label>

        <textarea
            id="learning"
            name="learning"
            rows="5"
            required>{{ entry.learning }}</textarea>

        <!-- Challenges -->

        <label for="confusion">Challenges / Doubts</label>

        <textarea
            id="confusion"
            name="confusion"
            rows="4">{{ entry.confusion }}</textarea>

        <button type="submit">

            Update Skill

        </button>

    </form>

</div>

<footer>

    <p>

        © 2026 LearnTrack | Built with Flask

    </p>

</footer>

</body>

</html>
