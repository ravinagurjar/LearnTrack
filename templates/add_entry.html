<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Add Skill | LearnTrack</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>


<body>


<nav>

    <div class="logo">
        LearnTrack
    </div>


    <ul>

        <li>
            <a href="/">Home</a>
        </li>

        <li>
            <a href="/entries">Skills</a>
        </li>

        <li>
            <a href="/about">About</a>
        </li>

        <li>
            <a href="/add" class="nav-btn">
                + Add Skill
            </a>
        </li>

    </ul>

</nav>




<div class="container">


<h1>
    Add New Skill
</h1>



<form action="/add" method="POST">


<!-- Skill Name -->

<label for="skill">
    Skill Name
</label>


<input

type="text"

id="skill"

name="skill"

placeholder="e.g. Python, Flask, DSA"

required

>




<!-- Category -->


<label for="category">
    Category
</label>


<select id="category" name="category" required>


<option value="" selected disabled>
Select Category
</option>


<option value="Programming">
Programming
</option>


<option value="Web Development">
Web Development
</option>


<option value="Data Structures">
Data Structures
</option>


<option value="Database">
Database
</option>


<option value="Tools">
Tools
</option>


<option value="Other">
Other
</option>


</select>





<!-- Level -->


<label for="level">
    Current Level
</label>


<select id="level" name="level" required>


<option value="" selected disabled>
Select Level
</option>


<option value="Beginner">
Beginner
</option>


<option value="Intermediate">
Intermediate
</option>


<option value="Advanced">
Advanced
</option>


</select>






<!-- Progress -->


<label for="progress">
    Progress (%)
</label>


<input

type="number"

id="progress"

name="progress"

min="0"

max="100"

placeholder="Example: 60"

required

>






<!-- Study Time -->


<label for="study_time">
    Time Invested (minutes)
</label>


<input

type="number"

id="study_time"

name="study_time"

placeholder="60"

min="1"

required

>







<!-- Learning -->


<label for="learning">

What did you learn?

</label>


<textarea

id="learning"

name="learning"

rows="5"

placeholder="Write your learning..."

required

></textarea>







<!-- Confusion -->


<label for="confusion">

Challenges / Doubts

</label>


<textarea

id="confusion"

name="confusion"

rows="4"

placeholder="What needs improvement?"

></textarea>







<button type="submit">

Save Skill

</button>



</form>


</div>


</body>

</html>
